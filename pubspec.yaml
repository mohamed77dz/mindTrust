name: mind_trust
description: منصة استشارات نفسية - تطبيق جوال بالعربية
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.7
  flutter_inappwebview: ^6.1.5
  flutter_localizations:
    sdk: flutter
  flutter_local_notifications: ^19.0.0
  flutter_riverpod: ^2.6.1
  flutter_timezone: ^4.1.0
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  supabase_flutter: ^2.8.3
  timezone: ^0.10.0
  cupertino_icons: ^1.0.9
  flutter_native_splash: ^2.4.7
  lottie: ^3.3.3
  smooth_page_indicator: ^2.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_screenutil: ^5.9.3
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "assets/images/mindTrust_adaptive_back.png"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true
 
flutter:
  uses-material-design: true
  assets:
    - assets/recaptcha/
    - assets/mindtrustlogo-removebg-preview.png
    - assets/supabase.env.json
    - assets/payments/
    - assets/images/
    - assets/animations/